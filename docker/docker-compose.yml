version: '3.9'
services:
  mongo:
    image: mongo:7.0
    ports: ['27017:27017']
    volumes: ['mongo_data:/data/db']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  api-gateway:
    build: ./server
    ports: ['5000:5000']
    env_file: .env
    depends_on:
      - mongo
      - redis

  ml-inference:
    build:
      context: ./ml
      dockerfile: ../docker/Dockerfile.ml
    ports: ['8001:8001']
    volumes: ['./ml/inference/models:/app/models']

  nlp-service:
    build: ./ml/nlp
    ports: ['8003:8003']
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

  client:
    build: ./client
    ports: ['5173:80']
    depends_on:
      - api-gateway

volumes:
  mongo_data:
